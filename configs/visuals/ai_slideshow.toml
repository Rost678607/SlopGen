# AI image slideshow: narration-synced pictures generated by Pollinations
# (free, no key, fast), Ken Burns motion. A good default AI visuals mode.
name = "ai_slideshow"
description = "AI-generated photo slideshow (free) synced to the narration"

[background]
source = "ai_photo"
linkage = "narration"
ai_model = "flux"  # flux | turbo
interval_s = 3.5
motion = "subtle"

[foreground]
enabled = false
